spring.application.name=rentify-backend
server.port=8080

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/rentify}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.open-in-view=false

spring.flyway.enabled=false
spring.jackson.property-naming-strategy=SNAKE_CASE
spring.data.web.pageable.serialization-mode=via_dto
spring.web.resources.cache.cachecontrol.cache-public=true
spring.web.resources.cache.cachecontrol.max-age=365d

application.security.jwt.secret-key=${SECRET_KEY}
application.security.jwt.expiration=86400000
application.security.jwt.revocation.enabled=${JWT_REVOCATION_ENABLED:true}
application.security.oauth.google.client-id=${GOOGLE_CLIENT_ID:}
application.security.auth.strategy=${AUTH_STRATEGY:bearer}
application.security.auth.cookie-name=${AUTH_COOKIE_NAME:rentify_access_token}
application.security.auth.cookie-path=/
application.security.auth.cookie-domain=${AUTH_COOKIE_DOMAIN:}
application.security.auth.cookie-secure=${AUTH_COOKIE_SECURE:true}
application.security.auth.cookie-http-only=true
application.security.auth.cookie-same-site=${AUTH_COOKIE_SAME_SITE:Lax}
application.security.auth.csrf.cookie-name=${CSRF_COOKIE_NAME:csrf_token}
application.security.auth.csrf.header-name=${CSRF_HEADER_NAME:X-CSRF-Token}
application.security.auth.csrf.cookie-secure=${CSRF_COOKIE_SECURE:false}
application.security.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
application.wallet.currency=${WALLET_CURRENCY:UAH}
application.wallet.top-up-options=${WALLET_TOP_UP_OPTIONS:300.00,500.00,1000.00}
application.availability.booking-fetch-page-size=${AVAILABILITY_BOOKING_FETCH_PAGE_SIZE:500}
application.locations.suggest.default-limit=${LOCATION_SUGGEST_DEFAULT_LIMIT:10}
application.locations.suggest.max-limit=${LOCATION_SUGGEST_MAX_LIMIT:50}
application.media.upload.max-file-size-bytes=${MEDIA_UPLOAD_MAX_FILE_SIZE_BYTES:10485760}
application.media.upload.allowed-mime-types=${MEDIA_UPLOAD_ALLOWED_MIME_TYPES:image/jpeg,image/jpg,image/png,image/webp}
application.media.cloudinary.folder=${CLOUDINARY_FOLDER:rentify/properties}
application.media.cloudinary.max-width=${CLOUDINARY_MAX_WIDTH:1200}
application.media.cloudinary.max-height=${CLOUDINARY_MAX_HEIGHT:800}
cache.short-max-age=${CACHE_SHORT_MAX_AGE:60}
cache.short-swr=${CACHE_SHORT_SWR:300}
cache.medium-max-age=${CACHE_MEDIUM_MAX_AGE:300}
cache.medium-swr=${CACHE_MEDIUM_SWR:1800}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.timeout=${REDIS_TIMEOUT:2s}
spring.config.import=optional:classpath:application-secret.properties

logging.level.org.springframework.security.config.annotation.authentication.configuration.InitializeUserDetailsBeanManagerConfigurer=ERROR
