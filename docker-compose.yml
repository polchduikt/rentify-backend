services:
  db:
    image: postgres:16-alpine
    container_name: rentify-db
    environment:
      POSTGRES_DB: rentify
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - rentify-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d rentify"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rentify-backend
    env_file:
      - .env
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://db:5432/rentify}
      DB_USERNAME: postgres
      DB_PASSWORD: ${DB_PASSWORD}
      SECRET_KEY: ${SECRET_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
      AUTH_STRATEGY: ${AUTH_STRATEGY:-cookie}
      AUTH_COOKIE_SECURE: ${AUTH_COOKIE_SECURE:-false}
      CSRF_COOKIE_SECURE: ${CSRF_COOKIE_SECURE:-false}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../rentify-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_AUTH_STRATEGY: ${AUTH_STRATEGY:-cookie}
        VITE_CSRF_COOKIE_NAME: ${CSRF_COOKIE_NAME:-csrf_token}
        VITE_CSRF_HEADER_NAME: ${CSRF_HEADER_NAME:-X-CSRF-Token}
        VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: rentify-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  rentify-postgres-data:
